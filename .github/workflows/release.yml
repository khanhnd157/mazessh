name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Maze SSH v__VERSION__'
          releaseBody: |
            ## Maze SSH v__VERSION__

            SSH Identity Orchestrator for Git Workflows.

            ### Desktop App
            - **Windows**: `.msi` (installer) or `.exe` (NSIS setup)
            - **macOS**: `.dmg` (Intel or Apple Silicon)
            - **Linux**: `.deb`, `.AppImage`, or `.rpm`

            ### CLI Tool (`maze-ssh-cli`)
            - **Windows**: `maze-ssh-cli-windows-x64.exe`
            - **macOS Intel**: `maze-ssh-cli-macos-x64`
            - **macOS ARM**: `maze-ssh-cli-macos-aarch64`
            - **Linux**: `maze-ssh-cli-linux-x64`

            ### Documentation
            - [User Guide](https://github.com/khanhnd157/mazessh/blob/master/docs/USER_GUIDE.md)
            - [CLI Reference](https://github.com/khanhnd157/mazessh/blob/master/docs/CLI.md)
            - [Changelog](https://github.com/khanhnd157/mazessh/blob/master/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-cli:
    needs: build-desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: maze-ssh-cli-windows-x64.exe
            ext: .exe
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: maze-ssh-cli-macos-x64
            ext: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: maze-ssh-cli-macos-aarch64
            ext: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: maze-ssh-cli-linux-x64
            ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libssl-dev

      - name: Build CLI
        working-directory: src-tauri
        run: cargo build --bin maze-ssh-cli --no-default-features --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: cp "src-tauri/target/${{ matrix.target }}/release/maze-ssh-cli${{ matrix.ext }}" "${{ matrix.artifact }}"

      - name: Upload CLI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
